<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="white" rx="8"/>
  <rect x="20" y="20" width="460" height="310" fill="#f9fafb" rx="6" stroke="#e5e7eb"/>
  <text x="40" y="55" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#059669">Chapitre 3 — Analyses Biochimiques</text>
  <line x1="40" y1="65" x2="460" y2="65" stroke="#d1fae5" stroke-width="2"/>
  <rect x="40" y="85" width="200" height="120" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="140" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#047857">Graphique enzymatique</text>
  <text x="140" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#047857">ASAT / ALAT</text>
  <rect x="260" y="85" width="200" height="30" rx="4" fill="#f3f4f6"/>
  <text x="270" y="105" font-family="Arial,sans-serif" font-size="11" fill="#374151">• Glucose : 0.70 - 1.10 g/L</text>
  <rect x="260" y="125" width="200" height="30" rx="4" fill="#f3f4f6"/>
  <text x="270" y="145" font-family="Arial,sans-serif" font-size="11" fill="#374151">• Créatinine : 6 - 12 mg/L</text>
  <rect x="260" y="165" width="200" height="30" rx="4" fill="#f3f4f6"/>
  <text x="270" y="185" font-family="Arial,sans-serif" font-size="11" fill="#374151">• Urée : 0.15 - 0.45 g/L</text>
  <rect x="40" y="230" width="420" height="80" rx="6" fill="#fffbeb" stroke="#fde68a"/>
  <text x="60" y="255" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400e">Note importante :</text>
  <text x="60" y="275" font-family="Arial,sans-serif" font-size="11" fill="#78350f">Les valeurs de référence varient selon le laboratoire</text>
  <text x="60" y="295" font-family="Arial,sans-serif" font-size="11" fill="#78350f">et les conditions de prélèvement du patient.</text>
</svg>
