<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="white" rx="8"/>
  <rect x="20" y="20" width="460" height="310" fill="#f9fafb" rx="6" stroke="#e5e7eb"/>
  <text x="40" y="55" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#dc2626">Chapitre 7 — Bilans Hématologiques</text>
  <line x1="40" y1="65" x2="460" y2="65" stroke="#fecaca" stroke-width="2"/>
  <circle cx="100" cy="160" r="50" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <circle cx="100" cy="160" r="30" fill="#ef4444" opacity="0.3"/>
  <circle cx="100" cy="160" r="15" fill="#dc2626" opacity="0.5"/>
  <text x="100" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#991b1b">Formule leucocytaire</text>
  <rect x="200" y="90" width="260" height="180" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="220" y="115" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#374151">NFS — Valeurs normales</text>
  <text x="220" y="140" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Hémoglobine : 12 - 16 g/dL</text>
  <text x="220" y="160" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Hématocrite : 36 - 46%</text>
  <text x="220" y="180" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">GB : 4000 - 10000 /mm³</text>
  <text x="220" y="200" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Plaquettes : 150000 - 400000</text>
  <text x="220" y="230" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">VGM : 80 - 100 fL</text>
  <text x="220" y="250" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">TCMH : 27 - 32 pg</text>
</svg>
